name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Type check
        working-directory: app
        run: npx tsc -b --noEmit

      - name: Test
        working-directory: app
        run: npm test

      - name: Build
        working-directory: app
        run: npm run build

      # Publish the Vite build to the repo root on `main` so GitHub Pages,
      # configured as "Deploy from a branch -> main -> / (root)", serves the
      # app. `npm run build` outputs to ../docs (gitignored); we copy that to
      # the repo root and commit it. The `[skip ci]` tag on the publish commit
      # stops it from re-triggering this workflow.
      - name: Publish build to GitHub Pages (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          rm -rf assets
          cp -rf docs/. .
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No build changes to publish."
          else
            git commit -m "Publish build to GitHub Pages [skip ci]"
            git push origin HEAD:main
          fi
